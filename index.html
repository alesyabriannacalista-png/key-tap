<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Glow Up Studio PRO</title>

<style>
body {
  margin:0;
  background:#0f172a;
  font-family:sans-serif;
  color:#e2e8f0;
  text-align:center;
}

h1 {margin:15px;}

#game {
  position:relative;
  width:260px;
  height:320px;
  margin:20px auto;
  background:#1e293b;
  border-radius:20px;
  overflow:hidden;
}

#face {
  position:absolute;
  width:200px;
  height:260px;
  background:#f1c27d;
  border-radius:120px;
  top:30px;
  left:30px;
}

.eye {
  position:absolute;
  width:20px;height:20px;
  background:#000;
  border-radius:50%;
  top:80px;
}

.eye.left{left:50px;}
.eye.right{right:50px;}

#lips, .blush, .eyeS {
  position:absolute;
  background:transparent;
}

#lips {
  width:70px;height:25px;
  bottom:60px;
  left:50%;transform:translateX(-50%);
  border-radius:20px;
}

.blush {
  width:35px;height:20px;
  top:140px;border-radius:50%;
}
#blushL{left:20px;}
#blushR{right:20px;}

.eyeS {
  width:35px;height:12px;
  top:70px;
}
#eyeL{left:45px;}
#eyeR{right:45px;}

#toolbar {
  margin-top:10px;
}

button, input {
  margin:5px;
  padding:8px;
  border:none;
  border-radius:8px;
}

button {
  background:#38bdf8;
  color:#0f172a;
  font-weight:bold;
  cursor:pointer;
}

button:hover {background:#0ea5e9;}

#score {color:#94a3b8;}
#result {margin-top:5px;}

</style>
</head>

<body>

<h1>Glow Up Studio PRO</h1>
<div id="score">Score: 0</div>
<div id="result"></div>

<div id="game">
  <div id="face">
    <div class="eye left"></div>
    <div class="eye right"></div>

    <div id="eyeL" class="eyeS"></div>
    <div id="eyeR" class="eyeS"></div>

    <div id="blushL" class="blush"></div>
    <div id="blushR" class="blush"></div>

    <div id="lips"></div>
  </div>
</div>

<div id="toolbar">
  <input type="color" id="picker" value="#ff4d6d">

  <button onclick="mode='lip'">Lip</button>
  <button onclick="mode='blush'">Blush</button>
  <button onclick="mode='eye'">Eye</button>

  <br>

  <button onclick="check()">Check</button>
  <button onclick="toggleBefore()">Before/After</button>
  <button onclick="saveImage()">Save</button>
</div>

<script>
let mode = "lip";
let score = 0;
let beforeState = true;

let current = {lip:"", blush:"", eye:""};

const target = {
  lip:"#ff4d6d",
  blush:"#ff8fab",
  eye:"#b388ff"
};

const face = document.getElementById("face");

face.addEventListener("click", (e)=>{
  let color = document.getElementById("picker").value;

  if(mode==="lip"){
    document.getElementById("lips").style.background=color;
    current.lip=color;
  }

  if(mode==="blush"){
    document.getElementById("blushL").style.background=color;
    document.getElementById("blushR").style.background=color;
    current.blush=color;
  }

  if(mode==="eye"){
    document.getElementById("eyeL").style.background=color;
    document.getElementById("eyeR").style.background=color;
    current.eye=color;
  }

  score+=3;
  update();
});

function update(){
  document.getElementById("score").innerText="Score: "+score;
}

function check(){
  let match=0;

  if(current.lip===target.lip) match++;
  if(current.blush===target.blush) match++;
  if(current.eye===target.eye) match++;

  let text="";

  if(match===3){
    text="✨ PERFECT!";
    score+=50;
  } else if(match===2){
    text="👍 Close!";
    score+=20;
  } else {
    text="❌ Nope!";
  }

  document.getElementById("result").innerText=text;
  update();
}

function toggleBefore(){
  beforeState=!beforeState;

  let elements=["lips","blushL","blushR","eyeL","eyeR"];

  elements.forEach(id=>{
    document.getElementById(id).style.display = beforeState ? "none":"block";
  });
}

function saveImage(){
  html2canvas(document.getElementById("game")).then(canvas=>{
    let link=document.createElement("a");
    link.download="makeup.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
